calendar:
  reference_label: আরও জানুন
  year_suffix: '{year} হি.'
  observances:
    ramadan:
      description: মুসলমানদের জন্য হিজরি নবম মাস, রোজা, প্রার্থনা ও চিন্তা-ভাবনার মাস।
      reference_url: https://bn.wikipedia.org/wiki/রমজান
    hajj_season:
      description: জিলহজ মাসে বার্ষিক হজ মৌসুম, হজের আচার-অনুষ্ঠানের দিনগুলোসহ।
      reference_url: https://bn.wikipedia.org/wiki/হজ
    hijri_new_year:
      description: মুহarram-এর প্রথম দিন ইসলামি হিজরি বছরের শুরু চিহ্নিত করে।
      reference_url: https://bn.wikipedia.org/wiki/হিজরি_বর্ষপঞ্জি
    first_day_of_ramadan:
      description: রমজানের প্রথম দিন, রোজার মাস শুরু হয়।
      reference_url: https://bn.wikipedia.org/wiki/রমজান
    laylat_al_qadr:
      description: কদরের রাত, সাধারণত রমজানের ২৭তম রাতে পালিত।
      reference_url: https://bn.wikipedia.org/wiki/লাইলাতুল_কদর
    isra_and_miraj:
      description: রজবের ২৭ তারিখে পালিত ইসরা ও মিরাজের স্মরণ।
      reference_url: https://bn.wikipedia.org/wiki/ইসরা_ও_মিরাজ
    last_day_of_ramadan:
      description: ঈদুল ফিতরের আগে রমজানের শেষ দিন।
      reference_url: https://bn.wikipedia.org/wiki/রমজান
    eid_al_fitr_eve:
      description: রমজান শেষে ঈদুল ফিতরের আগের রাত।
      reference_url: https://bn.wikipedia.org/wiki/ঈদুল_ফিতর
    eid_al_fitr:
      description: শাওয়ালের ১ তারিখে রমজান শেষের উৎসব।
      reference_url: https://bn.wikipedia.org/wiki/ঈদুল_ফিতর
    eid_al_fitr_day_2:
      description: ঈদুল ফিতর উদযাপনের দ্বিতীয় দিন।
      reference_url: https://bn.wikipedia.org/wiki/ঈদুল_ফিতর
    eid_al_fitr_day_3:
      description: ঈদুল ফিতর উদযাপনের তৃতীয় দিন।
      reference_url: https://bn.wikipedia.org/wiki/ঈদুল_ফিতর
    day_of_arafah:
      description: হজে আরাফাহর ময়দানে অবস্থানের দিন, জিলহজ ৯।
      reference_url: https://bn.wikipedia.org/wiki/আরাফাহ
    eid_al_adha:
      description: জিলহজ ১০ তারিখে ঈদুল আযহা উৎসব।
      reference_url: https://bn.wikipedia.org/wiki/ঈদুল_আযহা
    eid_al_adha_day_2:
      description: ঈদুল আযহার দ্বিতীয় দিন।
      reference_url: https://bn.wikipedia.org/wiki/ঈদুল_আযহা
    eid_al_adha_day_3:
      description: ঈদুল আযহার তৃতীয় দিন।
      reference_url: https://bn.wikipedia.org/wiki/ঈদুল_আযহা
    eid_al_adha_day_4:
      description: ঈদুল আযহার চতুর্থ দিন এবং হজ মৌসুমের শেষ।
      reference_url: https://bn.wikipedia.org/wiki/ঈদুল_আযহা
    ashura:
      description: মুহarram ১০ তারিখে পালিত, রোজা ও স্মরণের জন্য বিশেষ তাৎপর্যপূর্ণ।
      reference_url: https://bn.wikipedia.org/wiki/আশুরা
  history:
    battle_of_badr:
      name: বদর যুদ্ধ
      description: ২ হি. সালে মুসলমান ও কুরাইশের মধ্যে প্রথম বড় যুদ্ধ।
      reference_url: https://bn.wikipedia.org/wiki/বদর_যুদ্ধ
    battle_of_uhud:
      name: উহুদ যুদ্ধ
      description: ৩ হি. সালে উহুদ পাহাড়ের কাছে লড়াই।
      reference_url: https://bn.wikipedia.org/wiki/উহুদ_যুদ্ধ
    battle_of_khandaq:
      name: খন্দক যুদ্ধ
      description: ৫ হি. সালে মদিনা অবরোধ (খন্দক)।
      reference_url: https://bn.wikipedia.org/wiki/খন্দক_যুদ্ধ
    treaty_of_hudaybiyyah:
      name: হুদাইবিয়া চুক্তি
      description: ৬ হি. সালে মুসলমান ও কুরাইশের মধ্যে শান্তি চুক্তি।
      reference_url: https://bn.wikipedia.org/wiki/হুদাইবিয়া_চুক্তি
    conquest_of_khaybar:
      name: খাইবার বিজয়
      description: ৭ হি. সালে খাইবার দুর্গ দখল।
      reference_url: https://bn.wikipedia.org/wiki/খাইবার
    conquest_of_mecca:
      name: মক্কা বিজয়
      description: ৮ হি. সালে মক্কা বিজয়।
      reference_url: https://bn.wikipedia.org/wiki/মক্কা_বিজয়
    battle_of_hunayn:
      name: হুনাইন যুদ্ধ
      description: মক্কা বিজয়ের পর ৮ হি. সালে হুনাইন যুদ্ধ।
      reference_url: https://bn.wikipedia.org/wiki/হুনাইন_যুদ্ধ
    expedition_to_tabuk:
      name: তাবুক অভিযান
      description: ৯ হি. সালে তাবুক অভিযান।
      reference_url: https://bn.wikipedia.org/wiki/তাবুক_অভিযান
    battle_of_yarmouk:
      name: ইয়ারমুক যুদ্ধ
      description: ১৫ হি. সালে বizantin সেনাবাহিনীর বিরুদ্ধে নির্ণায়ক যুদ্ধ।
      reference_url: https://bn.wikipedia.org/wiki/ইয়ারমুক_যুদ্ধ
    battle_of_qadisiyyah:
      name: কাদিসিয়া যুদ্ধ
      description: ১৫ হি. সালে ইরাক মুসলমান বাহিনীর কাছে খুলে যায়।
      reference_url: https://bn.wikipedia.org/wiki/কাদিসিয়া_যুদ্ধ
    conquest_of_jerusalem:
      name: জেরুজালেম বিজয়
      description: ১৭ হি. সালে মুসলমানদের জেরুজালেমে প্রবেশ।
      reference_url: https://bn.wikipedia.org/wiki/জেরুজালেম
    conquest_of_egypt:
      name: মিশর বিজয়
      description: ২১ হি. সালে মিশরে মুসলমান সম্প্রসারণ।
      reference_url: https://bn.wikipedia.org/wiki/মিশর
    fall_of_constantinople:
      name: Constantinople-এর পতন
      description: ৮৫৭ হি. সালে Constantinople-এর পতন।
      reference_url: https://bn.wikipedia.org/wiki/ইস্তানবুল
