  entity_eid_al_fitr: ঈদুল ফিতর
  entity_eid_al_adha: ঈদুল আযহা
  entity_hajj_season: হজ মৌসুম
  issue_sunset_title: সূর্যাস্ত সীমানা অনুপলব্ধ
  issue_sunset_description: Home Assistant আপনার অবস্থানের জন্য সূর্যাস্ত গণনা করতে পারেনি। স্থানীয় মধ্যরাত ব্যবহার করতে হিজরি ক্যালেন্ডার পুনরায় কনফিগার করুন, অথবা Settings → System → General-এ একটি বৈধ অবস্থান সেট করুন।
  service_calibrate_name: তারিখ ক্যালিব্রেট করুন
  service_calibrate_description: আজকের জন্য ইন্টিগ্রেশন দিনের অফসেট ছোট আপেক্ষিক পরিবর্তন বা ঘোষিত হিজরি তারিখ দিয়ে সামঞ্জস্য করুন।
  service_calibrate_offset_name: অফসেট সমন্বয়
  service_calibrate_offset_description: বর্তমান ইন্টিগ্রেশন অফসেটে এই সংখ্যক দিন যোগ করুন (−2 থেকে +2)।
  service_calibrate_hijri_name: হিজরি তারিখ
  service_calibrate_hijri_description: আজকের ঘোষিত হিজরি তারিখ (ISO, যেমন 1446-10-15)। প্রয়োজনীয় অফসেট গণনা করে সংরক্ষণ করে।
  service_calibrate_language_name: ভাষা
  service_calibrate_language_description: প্রতিক্রিয়ায় ফরম্যাট করা ক্ষেত্রের ভাষা।
  exception_date_out_of_range: তারিখটি সমর্থিত উম্ম আল-কুরা পরিসরের বাইরে।
  exception_sunset_unavailable: সূর্যাস্ত গণনা করা যায়নি। Home Assistant অবস্থান সেটিংস পরীক্ষা করুন।
  exception_calibrate_no_config_entry: তারিখ ক্যালিব্রেট করার আগে হিজরি ক্যালেন্ডার কনফিগার করতে হবে।
  exception_calibrate_offset_out_of_range: প্রয়োজনীয় অফসেট {offset} সমর্থিত পরিসরের ({min} থেকে {max}) বাইরে।
  options_hijri_month_starts_calendar_language: মাস শুরুর ক্যালেন্ডারের ভাষা
  entity_calendar_month_starts: মাসের শুরু
