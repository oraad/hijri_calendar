calendar:
  reference_label: Подробнее
  year_suffix: '{year} г. х.'
  observances:
    ramadan:
      description: Девятый месяц Хиджры — месяц поста, молитвы и размышлений для мусульман.
      reference_url: https://ru.wikipedia.org/wiki/Рамадан
    hajj_season:
      description: Ежегодный сезон паломничества в месяце зуль-хиджа, включая дни обрядов хаджа.
      reference_url: https://ru.wikipedia.org/wiki/Хадж
    hijri_new_year:
      description: Первый день мухаррам отмечает начало исламского года по Хиджре.
      reference_url: https://ru.wikipedia.org/wiki/Хиджра_(календарь)
    first_day_of_ramadan:
      description: Первый день Рамадана, когда начинается месяц поста.
      reference_url: https://ru.wikipedia.org/wiki/Рамадан
    laylat_al_qadr:
      description: Ночь предопределения, широко отмечаемая 27-го числа Рамадана.
      reference_url: https://ru.wikipedia.org/wiki/Лайлат_аль-Кадр
    isra_and_miraj:
      description: Память ночного путешествия и вознесения, отмечается 27 раjab.
      reference_url: https://ru.wikipedia.org/wiki/Исра_и_Мираж
    last_day_of_ramadan:
      description: Последний день Рамадана перед Ид аль-Фитр.
      reference_url: https://ru.wikipedia.org/wiki/Рамадан
    eid_al_fitr_eve:
      description: Канун Ид аль-Фитр в конце Рамадана.
      reference_url: https://ru.wikipedia.org/wiki/Ид_аль-Фитр
    eid_al_fitr:
      description: Праздник окончания Рамадана 1 шавваля.
      reference_url: https://ru.wikipedia.org/wiki/Ид_аль-Фитр
    eid_al_fitr_day_2:
      description: Второй день празднования Ид аль-Фитр.
      reference_url: https://ru.wikipedia.org/wiki/Ид_аль-Фитр
    eid_al_fitr_day_3:
      description: Третий день празднования Ид аль-Фитр.
      reference_url: https://ru.wikipedia.org/wiki/Ид_аль-Фитр
    day_of_arafah:
      description: День стояния на Арафат во время хаджа 9 зуль-хиджа.
      reference_url: https://ru.wikipedia.org/wiki/Арафат
    eid_al_adha:
      description: Праздник жертвоприношения 10 зуль-хиджа.
      reference_url: https://ru.wikipedia.org/wiki/Ид_аль-Адха
    eid_al_adha_day_2:
      description: Второй день Ид аль-Адха.
      reference_url: https://ru.wikipedia.org/wiki/Ид_аль-Адха
    eid_al_adha_day_3:
      description: Третий день Ид аль-Адха.
      reference_url: https://ru.wikipedia.org/wiki/Ид_аль-Адха
    eid_al_adha_day_4:
      description: Четвёртый день Ид аль-Адха и завершение обрядов сезона хаджа.
      reference_url: https://ru.wikipedia.org/wiki/Ид_аль-Адха
    ashura:
      description: Отмечается 10 мухаррам, особенно значим для поста и поминовения.
      reference_url: https://ru.wikipedia.org/wiki/Ашура
  history:
    battle_of_badr:
      name: Битва при Бадре
      description: Первая крупная битва между мусульманами и курайшитами в 2 г. х.
      reference_url: https://ru.wikipedia.org/wiki/Битва_при_Бадре
    battle_of_uhud:
      name: Битва при Ухуд
      description: Битва у горы Ухуд в 3 г. х.
      reference_url: https://ru.wikipedia.org/wiki/Битва_при_Ухуде
    battle_of_khandaq:
      name: Битва при рве
      description: Осада Медины конфедератами в 5 г. х.
      reference_url: https://ru.wikipedia.org/wiki/Битва_при_рве
    treaty_of_hudaybiyyah:
      name: Худайбийский договор
      description: Мирное соглашение между мусульманами и курайшитами в 6 г. х.
      reference_url: https://ru.wikipedia.org/wiki/Худайбийский_мирный_договор
    conquest_of_khaybar:
      name: Завоевание Хайбар
      description: Поход мусульман против крепостей Хайбар в 7 г. х.
      reference_url: https://ru.wikipedia.org/wiki/Хайбар
    conquest_of_mecca:
      name: Завоевание Мекки
      description: Мирное вступление в Мекку в 8 г. х.
      reference_url: https://ru.wikipedia.org/wiki/Завоевание_Мекки
    battle_of_hunayn:
      name: Битва при Хунейн
      description: Битва после завоевания Мекки в 8 г. х.
      reference_url: https://ru.wikipedia.org/wiki/Битва_при_Хунейне
    expedition_to_tabuk:
      name: Поход на Табук
      description: Поход на Табук в 9 г. х.
      reference_url: https://ru.wikipedia.org/wiki/Поход_на_Табук
    battle_of_yarmouk:
      name: Битва на Ярмук
      description: Решающая битва с византийскими силами в 15 г. х.
      reference_url: https://ru.wikipedia.org/wiki/Битва_на_Ярмуке
    battle_of_qadisiyyah:
      name: Битва при аль-Кадисии
      description: Крупная битва, открывшая Ирак мусульманским силам в 15 г. х.
      reference_url: https://ru.wikipedia.org/wiki/Битва_при_аль-Кадисии
    conquest_of_jerusalem:
      name: Завоевание Иерусалима
      description: Вступление мусульман в Иерусалим в 17 г. х.
      reference_url: https://ru.wikipedia.org/wiki/Иерусалим
    conquest_of_egypt:
      name: Завоевание Египта
      description: Расширение мусульман в Египет в 21 г. х.
      reference_url: https://ru.wikipedia.org/wiki/Египет
    fall_of_constantinople:
      name: Падение Константинополя
      description: Османское завоевание Константинополя в 857 г. х.
      reference_url: https://ru.wikipedia.org/wiki/Падение_Константинополя
