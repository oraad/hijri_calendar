calendar:
  reference_label: Saber mais
  year_suffix: '{year} AH'
  observances:
    ramadan:
      description: O nono mês Hijri de jejum, oração e reflexão para os muçulmanos.
      reference_url: https://pt.wikipedia.org/wiki/Ramad%C3%A3o
    hajj_season:
      description: A época anual de peregrinação em Dhu al-Hijjah, incluindo os dias dos ritos do Hajj.
      reference_url: https://pt.wikipedia.org/wiki/Hajj
    hijri_new_year:
      description: O primeiro dia de Muharram marca o início do ano Hijri islâmico.
      reference_url: https://pt.wikipedia.org/wiki/Calend%C3%A1rio_hijri
    first_day_of_ramadan:
      description: O primeiro dia do Ramadão, quando começa o mês de jejum.
      reference_url: https://pt.wikipedia.org/wiki/Ramad%C3%A3o
    laylat_al_qadr:
      description: A Noite do Decreto, amplamente observada a 27 de Ramadão.
      reference_url: https://pt.wikipedia.org/wiki/Laylat_al-Qadr
    isra_and_miraj:
      description: Comemora a viagem noturna e ascensão, observada a 27 de Rajab.
      reference_url: https://pt.wikipedia.org/wiki/Isra_e_Mi%27raj
    last_day_of_ramadan:
      description: O último dia do Ramadão antes do Eid al-Fitr.
      reference_url: https://pt.wikipedia.org/wiki/Ramad%C3%A3o
    eid_al_fitr_eve:
      description: A véspera do Eid al-Fitr no fim do Ramadão.
      reference_url: https://pt.wikipedia.org/wiki/Eid_al-Fitr
    eid_al_fitr:
      description: Festividade que marca o fim do Ramadão a 1 de Shawwal.
      reference_url: https://pt.wikipedia.org/wiki/Eid_al-Fitr
    eid_al_fitr_day_2:
      description: O segundo dia das celebrações do Eid al-Fitr.
      reference_url: https://pt.wikipedia.org/wiki/Eid_al-Fitr
    eid_al_fitr_day_3:
      description: O terceiro dia das celebrações do Eid al-Fitr.
      reference_url: https://pt.wikipedia.org/wiki/Eid_al-Fitr
    day_of_arafah:
      description: O dia da permanência em Arafat durante o Hajj a 9 de Dhu al-Hijjah.
      reference_url: https://pt.wikipedia.org/wiki/Monte_Arafat
    eid_al_adha:
      description: Festa do Sacrifício a 10 de Dhu al-Hijjah.
      reference_url: https://pt.wikipedia.org/wiki/Eid_al-Adha
    eid_al_adha_day_2:
      description: O segundo dia do Eid al-Adha.
      reference_url: https://pt.wikipedia.org/wiki/Eid_al-Adha
    eid_al_adha_day_3:
      description: O terceiro dia do Eid al-Adha.
      reference_url: https://pt.wikipedia.org/wiki/Eid_al-Adha
    eid_al_adha_day_4:
      description: O quarto dia do Eid al-Adha e o fim dos ritos da época do Hajj.
      reference_url: https://pt.wikipedia.org/wiki/Eid_al-Adha
    ashura:
      description: Observado a 10 de Muharram, especialmente significativo para jejum e memória.
      reference_url: https://pt.wikipedia.org/wiki/Ashura
  history:
    battle_of_badr:
      name: Batalha de Badr
      description: A primeira grande batalha entre muçulmanos e coraixitas em 2 AH.
      reference_url: https://pt.wikipedia.org/wiki/Batalha_de_Badr
    battle_of_uhud:
      name: Batalha de Uhud
      description: Uma batalha perto do monte Uhud em 3 AH.
      reference_url: https://pt.wikipedia.org/wiki/Batalha_de_Uhud
    battle_of_khandaq:
      name: Batalha da Trincheira
      description: O cerco a Medina pela confederação em 5 AH.
      reference_url: https://pt.wikipedia.org/wiki/Batalha_da_Trincheira
    treaty_of_hudaybiyyah:
      name: Tratado de Hudaybiyya
      description: Um acordo de paz entre muçulmanos e coraixitas em 6 AH.
      reference_url: https://pt.wikipedia.org/wiki/Tratado_de_Hudaybiyya
    conquest_of_khaybar:
      name: Conquista de Khaybar
      description: Campanha muçulmana contra as fortalezas de Khaybar em 7 AH.
      reference_url: https://pt.wikipedia.org/wiki/Khaybar
    conquest_of_mecca:
      name: Conquista de Meca
      description: A abertura pacífica de Meca em 8 AH.
      reference_url: https://pt.wikipedia.org/wiki/Conquista_de_Meca
    battle_of_hunayn:
      name: Batalha de Hunayn
      description: Uma batalha após a conquista de Meca em 8 AH.
      reference_url: https://pt.wikipedia.org/wiki/Batalha_de_Hunayn
    expedition_to_tabuk:
      name: Expedição a Tabuk
      description: A campanha de Tabuk em 9 AH.
      reference_url: https://pt.wikipedia.org/wiki/Expedi%C3%A7%C3%A3o_a_Tabuk
    battle_of_yarmouk:
      name: Batalha de Yarmuk
      description: Uma batalha decisiva contra forças bizantinas em 15 AH.
      reference_url: https://pt.wikipedia.org/wiki/Batalha_de_Yarmuk
    battle_of_qadisiyyah:
      name: Batalha de al-Qadisiyya
      description: Uma batalha importante que abriu o Iraque às forças muçulmanas em 15 AH.
      reference_url: https://pt.wikipedia.org/wiki/Batalha_de_al-Qadisiyya
    conquest_of_jerusalem:
      name: Conquista de Jerusalém
      description: A entrada muçulmana em Jerusalém em 17 AH.
      reference_url: https://pt.wikipedia.org/wiki/Jerusal%C3%A9m
    conquest_of_egypt:
      name: Conquista do Egito
      description: A expansão muçulmana para o Egito em 21 AH.
      reference_url: https://pt.wikipedia.org/wiki/Egito
    fall_of_constantinople:
      name: Queda de Constantinopla
      description: A conquista otomana de Constantinopla em 857 AH.
      reference_url: https://pt.wikipedia.org/wiki/Queda_de_Constantinopla
