calendar:
  reference_label: بیشتر بدانید
  year_suffix: '{year} ه.ق.'
  observances:
    ramadan:
      description: نهمین ماه هجری روزه، نماز و تفکر برای مسلمانان.
      reference_url: https://fa.wikipedia.org/wiki/رمضان
    hajj_season:
      description: فصل سالانه حج در ذی‌الحجه، شامل روزهای مناسک حج.
      reference_url: https://fa.wikipedia.org/wiki/حج
    hijri_new_year:
      description: اولین روز محرم آغاز سال هجری اسلامی را نشان می‌دهد.
      reference_url: https://fa.wikipedia.org/wiki/گاه‌شماری_هجری_قمری
    first_day_of_ramadan:
      description: اولین روز رمضان که ماه روزه آغاز می‌شود.
      reference_url: https://fa.wikipedia.org/wiki/رمضان
    laylat_al_qadr:
      description: شب قدر، که معمولاً در شب بیست‌وهفتم رمضان گرامی داشته می‌شود.
      reference_url: https://fa.wikipedia.org/wiki/شب_قدر
    isra_and_miraj:
      description: بزرگداشت شب معراج، در بیست‌وهفتم رجب.
      reference_url: https://fa.wikipedia.org/wiki/معراج
    last_day_of_ramadan:
      description: آخرین روز رمضان پیش از عید فطر.
      reference_url: https://fa.wikipedia.org/wiki/رمضان
    eid_al_fitr_eve:
      description: شب عید فطر در پایان رمضان.
      reference_url: https://fa.wikipedia.org/wiki/عید_فطر
    eid_al_fitr:
      description: جشن پایان رمضان در اول شوال.
      reference_url: https://fa.wikipedia.org/wiki/عید_فطر
    eid_al_fitr_day_2:
      description: دومین روز جشن عید فطر.
      reference_url: https://fa.wikipedia.org/wiki/عید_فطر
    eid_al_fitr_day_3:
      description: سومین روز جشن عید فطر.
      reference_url: https://fa.wikipedia.org/wiki/عید_فطر
    day_of_arafah:
      description: روز وقوف در عرفه در حج، نهم ذی‌الحجه.
      reference_url: https://fa.wikipedia.org/wiki/عرفات
    eid_al_adha:
      description: عید قربان در دهم ذی‌الحجه.
      reference_url: https://fa.wikipedia.org/wiki/عید_قربان
    eid_al_adha_day_2:
      description: دومین روز عید قربان.
      reference_url: https://fa.wikipedia.org/wiki/عید_قربان
    eid_al_adha_day_3:
      description: سومین روز عید قربان.
      reference_url: https://fa.wikipedia.org/wiki/عید_قربان
    eid_al_adha_day_4:
      description: چهارمین روز عید قربان و پایان مناسک فصل حج.
      reference_url: https://fa.wikipedia.org/wiki/عید_قربان
    ashura:
      description: در دهم محرم گرامی داشته می‌شود، به‌ویژه برای روزه و یادبود.
      reference_url: https://fa.wikipedia.org/wiki/عاشورا
  history:
    battle_of_badr:
      name: غزوه بدر
      description: نخستین نبرد بزرگ میان مسلمانان و قریش در ۲ ه.ق.
      reference_url: https://fa.wikipedia.org/wiki/غزوه_بدر
    battle_of_uhud:
      name: غزوه احد
      description: نبردی در نزدیکی کوه احد در ۳ ه.ق.
      reference_url: https://fa.wikipedia.org/wiki/غزوه_احد
    battle_of_khandaq:
      name: غزوه خندق
      description: محاصره مدینه توسط احزاب در ۵ ه.ق.
      reference_url: https://fa.wikipedia.org/wiki/غزوه_خندق
    treaty_of_hudaybiyyah:
      name: صلح حدیبیه
      description: پیمان صلح میان مسلمانان و قریش در ۶ ه.ق.
      reference_url: https://fa.wikipedia.org/wiki/صلح_حدیبیه
    conquest_of_khaybar:
      name: فتح خیبر
      description: حمله مسلمانان به قلعه‌های خیبر در ۷ ه.ق.
      reference_url: https://fa.wikipedia.org/wiki/خیبر
    conquest_of_mecca:
      name: فتح مکه
      description: فتح مسالمت‌آمیز مکه در ۸ ه.ق.
      reference_url: https://fa.wikipedia.org/wiki/فتح_مکه
    battle_of_hunayn:
      name: غزوه حنین
      description: نبردی پس از فتح مکه در ۸ ه.ق.
      reference_url: https://fa.wikipedia.org/wiki/غزوه_حنین
    expedition_to_tabuk:
      name: غزوه تبوک
      description: غزوه تبوک در ۹ ه.ق.
      reference_url: https://fa.wikipedia.org/wiki/غزوه_تبوک
    battle_of_yarmouk:
      name: نبرد یرموک
      description: نبردی سرنوشت‌ساز علیه نیروهای بیزانس در ۱۵ ه.ق.
      reference_url: https://fa.wikipedia.org/wiki/نبرد_یرموک
    battle_of_qadisiyyah:
      name: نبرد قادسیه
      description: نبرد مهمی که عراق را به نیروهای مسلمان گشود، در ۱۵ ه.ق.
      reference_url: https://fa.wikipedia.org/wiki/نبرد_قادسیه
    conquest_of_jerusalem:
      name: فتح بیت‌المقدس
      description: ورود مسلمانان به بیت‌المقدس در ۱۷ ه.ق.
      reference_url: https://fa.wikipedia.org/wiki/بیت‌المقدس
    conquest_of_egypt:
      name: فتح مصر
      description: گسترش مسلمانان به مصر در ۲۱ ه.ق.
      reference_url: https://fa.wikipedia.org/wiki/مصر
    fall_of_constantinople:
      name: فتح قسطنطنیه
      description: فتح قسطنطنیه توسط عثمانیان در ۸۵۷ ه.ق.
      reference_url: https://fa.wikipedia.org/wiki/فتح_قسطنطنیه
