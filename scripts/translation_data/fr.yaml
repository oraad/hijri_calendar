calendar:
  reference_label: En savoir plus
  year_suffix: '{year} AH'
  observances:
    ramadan:
      description: Le neuvième mois Hijri de jeûne, prière et recueillement pour les musulmans.
      reference_url: https://fr.wikipedia.org/wiki/Ramadan
    hajj_season:
      description: La saison annuelle de pèlerinage en Dhou al-Hijja, incluant les jours des rites du Hajj.
      reference_url: https://fr.wikipedia.org/wiki/Hajj
    hijri_new_year:
      description: Le premier jour de Mouharram marque le début de l'année Hijri islamique.
      reference_url: https://fr.wikipedia.org/wiki/Calendrier_h%C3%A9girien
    first_day_of_ramadan:
      description: Le premier jour du Ramadan, lorsque commence le mois de jeûne.
      reference_url: https://fr.wikipedia.org/wiki/Ramadan
    laylat_al_qadr:
      description: La Nuit du Destin, largement observée le 27 Ramadan.
      reference_url: https://fr.wikipedia.org/wiki/Laylat_al-Qadr
    isra_and_miraj:
      description: Commémore le voyage nocturne et l'ascension, observé le 27 Rajab.
      reference_url: https://fr.wikipedia.org/wiki/Isra_et_Mi%27raj
    last_day_of_ramadan:
      description: Le dernier jour du Ramadan avant l'Aïd al-Fitr.
      reference_url: https://fr.wikipedia.org/wiki/Ramadan
    eid_al_fitr_eve:
      description: La veille de l'Aïd al-Fitr à la fin du Ramadan.
      reference_url: https://fr.wikipedia.org/wiki/A%C3%AFd_al-Fitr
    eid_al_fitr:
      description: Fête marquant la fin du Ramadan le 1 Chawwal.
      reference_url: https://fr.wikipedia.org/wiki/A%C3%AFd_al-Fitr
    eid_al_fitr_day_2:
      description: Le deuxième jour des célébrations de l'Aïd al-Fitr.
      reference_url: https://fr.wikipedia.org/wiki/A%C3%AFd_al-Fitr
    eid_al_fitr_day_3:
      description: Le troisième jour des célébrations de l'Aïd al-Fitr.
      reference_url: https://fr.wikipedia.org/wiki/A%C3%AFd_al-Fitr
    day_of_arafah:
      description: Le jour de la station à Arafat pendant le Hajj le 9 Dhou al-Hijja.
      reference_url: https://fr.wikipedia.org/wiki/Mont_Arafat
    eid_al_adha:
      description: Fête du Sacrifice le 10 Dhou al-Hijja.
      reference_url: https://fr.wikipedia.org/wiki/A%C3%AFd_al-Adha
    eid_al_adha_day_2:
      description: Le deuxième jour de l'Aïd al-Adha.
      reference_url: https://fr.wikipedia.org/wiki/A%C3%AFd_al-Adha
    eid_al_adha_day_3:
      description: Le troisième jour de l'Aïd al-Adha.
      reference_url: https://fr.wikipedia.org/wiki/A%C3%AFd_al-Adha
    eid_al_adha_day_4:
      description: Le quatrième jour de l'Aïd al-Adha et la fin des rites de la saison du Hajj.
      reference_url: https://fr.wikipedia.org/wiki/A%C3%AFd_al-Adha
    ashura:
      description: Observé le 10 Mouharram, particulièrement significatif pour le jeûne et le souvenir.
      reference_url: https://fr.wikipedia.org/wiki/Achoura
  history:
    battle_of_badr:
      name: Bataille de Badr
      description: La première grande bataille entre musulmans et Quraychites en 2 AH.
      reference_url: https://fr.wikipedia.org/wiki/Bataille_de_Badr
    battle_of_uhud:
      name: Bataille d'Uhud
      description: Une bataille près du mont Uhud en 3 AH.
      reference_url: https://fr.wikipedia.org/wiki/Bataille_d%27Uhud
    battle_of_khandaq:
      name: Bataille de la Tranchée
      description: Le siège de Médine par la confédération en 5 AH.
      reference_url: https://fr.wikipedia.org/wiki/Bataille_de_la_Tranch%C3%A9e
    treaty_of_hudaybiyyah:
      name: Traité de Hudaybiyya
      description: Un accord de paix entre musulmans et Quraychites en 6 AH.
      reference_url: https://fr.wikipedia.org/wiki/Trait%C3%A9_de_Hudaybiyya
    conquest_of_khaybar:
      name: Conquête de Khaybar
      description: Campagne musulmane contre les forteresses de Khaybar en 7 AH.
      reference_url: https://fr.wikipedia.org/wiki/Khaybar
    conquest_of_mecca:
      name: Conquête de La Mecque
      description: L'ouverture pacifique de La Mecque en 8 AH.
      reference_url: https://fr.wikipedia.org/wiki/Conqu%C3%AAte_de_La_Mecque
    battle_of_hunayn:
      name: Bataille de Hunayn
      description: Une bataille après la conquête de La Mecque en 8 AH.
      reference_url: https://fr.wikipedia.org/wiki/Bataille_de_Hunayn
    expedition_to_tabuk:
      name: Expédition de Tabuk
      description: La campagne de Tabuk en 9 AH.
      reference_url: https://fr.wikipedia.org/wiki/Exp%C3%A9dition_de_Tabuk
    battle_of_yarmouk:
      name: Bataille de Yarmouk
      description: Une bataille décisive contre les forces byzantines en 15 AH.
      reference_url: https://fr.wikipedia.org/wiki/Bataille_de_Yarmouk
    battle_of_qadisiyyah:
      name: Bataille de al-Qadisiyya
      description: Une bataille majeure ouvrant l'Irak aux forces musulmanes en 15 AH.
      reference_url: https://fr.wikipedia.org/wiki/Bataille_de_al-Qadisiyya
    conquest_of_jerusalem:
      name: Conquête de Jérusalem
      description: L'entrée musulmane à Jérusalem en 17 AH.
      reference_url: https://fr.wikipedia.org/wiki/J%C3%A9rusalem
    conquest_of_egypt:
      name: Conquête de l'Égypte
      description: L'expansion musulmane en Égypte en 21 AH.
      reference_url: https://fr.wikipedia.org/wiki/%C3%89gypte
    fall_of_constantinople:
      name: Chute de Constantinople
      description: La conquête ottomane de Constantinople en 857 AH.
      reference_url: https://fr.wikipedia.org/wiki/Chute_de_Constantinople
