calendar:
  reference_label: Dowiedz się więcej
  year_suffix: '{year} AH'
  observances:
    ramadan:
      description: Dziewiąty miesiąc hijri postu, modlitwy i refleksji dla muzułmanów.
      reference_url: https://pl.wikipedia.org/wiki/Ramadan
    hajj_season:
      description: Coroczny sezon pielgrzymki w Dhu al-Hidżdża, obejmujący dni rytuałów hadżu.
      reference_url: https://pl.wikipedia.org/wiki/Had%C5%BC
    hijri_new_year:
      description: Pierwszy dzień Muharram wyznacza początek islamskiego roku hijri.
      reference_url: https://pl.wikipedia.org/wiki/Kalendarz_muzu%C5%82ma%C5%84ski
    first_day_of_ramadan:
      description: Pierwszy dzień Ramadanu, gdy rozpoczyna się miesiąc postu.
      reference_url: https://pl.wikipedia.org/wiki/Ramadan
    laylat_al_qadr:
      description: Noc Przeznaczenia, powszechnie obchodzona 27. dnia Ramadanu.
      reference_url: https://pl.wikipedia.org/wiki/Lailat_al-Qadr
    isra_and_miraj:
      description: Upamiętnia nocną podróż i wniebowstąpienie, obchodzone 27. dnia Radżabu.
      reference_url: https://pl.wikipedia.org/wiki/Isra_i_Mi%27rad%C5%BC
    last_day_of_ramadan:
      description: Ostatni dzień Ramadanu przed Eid al-Fitr.
      reference_url: https://pl.wikipedia.org/wiki/Ramadan
    eid_al_fitr_eve:
      description: Wigilia Eid al-Fitr na koniec Ramadanu.
      reference_url: https://pl.wikipedia.org/wiki/Eid_al-Fitr
    eid_al_fitr:
      description: Święto kończące Ramadan 1. dnia Szawwalu.
      reference_url: https://pl.wikipedia.org/wiki/Eid_al-Fitr
    eid_al_fitr_day_2:
      description: Drugi dzień obchodów Eid al-Fitr.
      reference_url: https://pl.wikipedia.org/wiki/Eid_al-Fitr
    eid_al_fitr_day_3:
      description: Trzeci dzień obchodów Eid al-Fitr.
      reference_url: https://pl.wikipedia.org/wiki/Eid_al-Fitr
    day_of_arafah:
      description: Dzień stania na Arafat podczas hadżu 9. dnia Dhu al-Hidżdża.
      reference_url: https://pl.wikipedia.org/wiki/Arafat
    eid_al_adha:
      description: Święto Ofiary 10. dnia Dhu al-Hidżdża.
      reference_url: https://pl.wikipedia.org/wiki/Eid_al-Adha
    eid_al_adha_day_2:
      description: Drugi dzień Eid al-Adha.
      reference_url: https://pl.wikipedia.org/wiki/Eid_al-Adha
    eid_al_adha_day_3:
      description: Trzeci dzień Eid al-Adha.
      reference_url: https://pl.wikipedia.org/wiki/Eid_al-Adha
    eid_al_adha_day_4:
      description: Czwarty dzień Eid al-Adha i koniec rytuałów sezonu hadżu.
      reference_url: https://pl.wikipedia.org/wiki/Eid_al-Adha
    ashura:
      description: Obchodzone 10. dnia Muharram, szczególnie ważne dla postu i pamięci.
      reference_url: https://pl.wikipedia.org/wiki/asz-Szura
  history:
    battle_of_badr:
      name: Bitwa pod Badr
      description: Pierwsza wielka bitwa między muzułmanami a Kurajszami w 2 AH.
      reference_url: https://pl.wikipedia.org/wiki/Bitwa_pod_Badr
    battle_of_uhud:
      name: Bitwa pod Uhud
      description: Bitwa w pobliżu góry Uhud w 3 AH.
      reference_url: https://pl.wikipedia.org/wiki/Bitwa_pod_Uhud
    battle_of_khandaq:
      name: Bitwa w Okopie
      description: Oblężenie Medyny przez konfederację w 5 AH.
      reference_url: https://pl.wikipedia.org/wiki/Bitwa_w_Okopie
    treaty_of_hudaybiyyah:
      name: Traktat z Hudaybiyya
      description: Porozumienie pokojowe między muzułmanami a Kurajszami w 6 AH.
      reference_url: https://pl.wikipedia.org/wiki/Traktat_z_Hudaybiyya
    conquest_of_khaybar:
      name: Podbój Chajbaru
      description: Muzułmańska wyprawa przeciw twierdzom Chajbaru w 7 AH.
      reference_url: https://pl.wikipedia.org/wiki/Chajbar
    conquest_of_mecca:
      name: Podbój Mekki
      description: Pokojowe otwarcie Mekki w 8 AH.
      reference_url: https://pl.wikipedia.org/wiki/Podb%C3%B3j_Mekki
    battle_of_hunayn:
      name: Bitwa pod Hunajn
      description: Bitwa po podboju Mekki w 8 AH.
      reference_url: https://pl.wikipedia.org/wiki/Bitwa_pod_Hunajn
    expedition_to_tabuk:
      name: Wyprawa do Tabuk
      description: Wyprawa do Tabuk w 9 AH.
      reference_url: https://pl.wikipedia.org/wiki/Wyprawa_do_Tabuk
    battle_of_yarmouk:
      name: Bitwa nad Jarmuk
      description: Decydująca bitwa z wojskami bizantyjskimi w 15 AH.
      reference_url: https://pl.wikipedia.org/wiki/Bitwa_nad_Jarmuk
    battle_of_qadisiyyah:
      name: Bitwa pod al-Kadisijja
      description: Ważna bitwa otwierająca Irak przed wojskami muzułmańskimi w 15 AH.
      reference_url: https://pl.wikipedia.org/wiki/Bitwa_pod_al-Kadisijja
    conquest_of_jerusalem:
      name: Podbój Jerozolimy
      description: Wejście muzułmanów do Jerozolimy w 17 AH.
      reference_url: https://pl.wikipedia.org/wiki/Jerozolima
    conquest_of_egypt:
      name: Podbój Egiptu
      description: Ekspansja muzułmańska do Egiptu w 21 AH.
      reference_url: https://pl.wikipedia.org/wiki/Egipt
    fall_of_constantinople:
      name: Upadek Konstantynopola
      description: Osmańskie zdobycie Konstantynopola w 857 AH.
      reference_url: https://pl.wikipedia.org/wiki/Upadek_Konstantynopola
