calendar:
  reference_label: Scopri di più
  year_suffix: '{year} d.H.'
  observances:
    ramadan:
      description: Il nono mese Hijri di digiuno, preghiera e riflessione per i musulmani.
      reference_url: https://it.wikipedia.org/wiki/Ramadan
    hajj_season:
      description: La stagione annuale del pellegrinaggio a Dhul Hijjah, inclusi i giorni dei riti dell'Hajj.
      reference_url: https://it.wikipedia.org/wiki/Hajj
    hijri_new_year:
      description: Il primo giorno di Muharram segna l'inizio dell'anno Hijri islamico.
      reference_url: https://it.wikipedia.org/wiki/Calendario_hijri
    first_day_of_ramadan:
      description: Il primo giorno del Ramadan, quando inizia il mese del digiuno.
      reference_url: https://it.wikipedia.org/wiki/Ramadan
    laylat_al_qadr:
      description: La Notte del Decreto, ampiamente osservata il 27 Ramadan.
      reference_url: https://it.wikipedia.org/wiki/Laylat_al-Qadr
    isra_and_miraj:
      description: Commemora il viaggio notturno e l'ascensione, osservato il 27 Rajab.
      reference_url: https://it.wikipedia.org/wiki/Isra_e_Mi%27raj
    last_day_of_ramadan:
      description: L'ultimo giorno del Ramadan prima dell'Eid al-Fitr.
      reference_url: https://it.wikipedia.org/wiki/Ramadan
    eid_al_fitr_eve:
      description: La vigilia dell'Eid al-Fitr alla fine del Ramadan.
      reference_url: https://it.wikipedia.org/wiki/Eid_al-Fitr
    eid_al_fitr:
      description: Festa che segna la fine del Ramadan il 1 Shawwal.
      reference_url: https://it.wikipedia.org/wiki/Eid_al-Fitr
    eid_al_fitr_day_2:
      description: Il secondo giorno delle celebrazioni dell'Eid al-Fitr.
      reference_url: https://it.wikipedia.org/wiki/Eid_al-Fitr
    eid_al_fitr_day_3:
      description: Il terzo giorno delle celebrazioni dell'Eid al-Fitr.
      reference_url: https://it.wikipedia.org/wiki/Eid_al-Fitr
    day_of_arafah:
      description: Il giorno della permanenza ad Arafat durante l'Hajj il 9 Dhul Hijjah.
      reference_url: https://it.wikipedia.org/wiki/Monte_Arafat
    eid_al_adha:
      description: Festa del Sacrificio il 10 Dhul Hijjah.
      reference_url: https://it.wikipedia.org/wiki/Eid_al-Adha
    eid_al_adha_day_2:
      description: Il secondo giorno dell'Eid al-Adha.
      reference_url: https://it.wikipedia.org/wiki/Eid_al-Adha
    eid_al_adha_day_3:
      description: Il terzo giorno dell'Eid al-Adha.
      reference_url: https://it.wikipedia.org/wiki/Eid_al-Adha
    eid_al_adha_day_4:
      description: Il quarto giorno dell'Eid al-Adha e la fine dei riti della stagione dell'Hajj.
      reference_url: https://it.wikipedia.org/wiki/Eid_al-Adha
    ashura:
      description: Osservato il 10 Muharram, particolarmente significativo per il digiuno e la commemorazione.
      reference_url: https://it.wikipedia.org/wiki/Ashura
  history:
    battle_of_badr:
      name: Battaglia di Badr
      description: La prima grande battaglia tra musulmani e Quraysh nel 2 d.H.
      reference_url: https://it.wikipedia.org/wiki/Battaglia_di_Badr
    battle_of_uhud:
      name: Battaglia di Uhud
      description: Una battaglia vicino al monte Uhud nel 3 d.H.
      reference_url: https://it.wikipedia.org/wiki/Battaglia_di_Uhud
    battle_of_khandaq:
      name: Battaglia della Trincea
      description: L'assedio di Medina da parte della confederazione nel 5 d.H.
      reference_url: https://it.wikipedia.org/wiki/Battaglia_della_Trincea
    treaty_of_hudaybiyyah:
      name: Trattato di Hudaybiyya
      description: Un accordo di pace tra musulmani e Quraysh nel 6 d.H.
      reference_url: https://it.wikipedia.org/wiki/Trattato_di_Hudaybiyya
    conquest_of_khaybar:
      name: Conquista di Khaybar
      description: Campagna musulmana contro le fortezze di Khaybar nel 7 d.H.
      reference_url: https://it.wikipedia.org/wiki/Khaybar
    conquest_of_mecca:
      name: Conquista della Mecca
      description: L'apertura pacifica della Mecca nell'8 d.H.
      reference_url: https://it.wikipedia.org/wiki/Conquista_della_Mecca
    battle_of_hunayn:
      name: Battaglia di Hunayn
      description: Una battaglia dopo la conquista della Mecca nell'8 d.H.
      reference_url: https://it.wikipedia.org/wiki/Battaglia_di_Hunayn
    expedition_to_tabuk:
      name: Spedizione a Tabuk
      description: La campagna di Tabuk nel 9 d.H.
      reference_url: https://it.wikipedia.org/wiki/Spedizione_a_Tabuk
    battle_of_yarmouk:
      name: Battaglia di Yarmuk
      description: Una battaglia decisiva contro le forze bizantine nel 15 d.H.
      reference_url: https://it.wikipedia.org/wiki/Battaglia_di_Yarmuk
    battle_of_qadisiyyah:
      name: Battaglia di al-Qadisiyya
      description: Una battaglia importante che aprì l'Iraq alle forze musulmane nel 15 d.H.
      reference_url: https://it.wikipedia.org/wiki/Battaglia_di_al-Qadisiyya
    conquest_of_jerusalem:
      name: Conquista di Gerusalemme
      description: L'ingresso musulmano a Gerusalemme nel 17 d.H.
      reference_url: https://it.wikipedia.org/wiki/Gerusalemme
    conquest_of_egypt:
      name: Conquista dell'Egitto
      description: L'espansione musulmana in Egitto nel 21 d.H.
      reference_url: https://it.wikipedia.org/wiki/Egitto
    fall_of_constantinople:
      name: Caduta di Costantinopoli
      description: La conquista ottomana di Costantinopoli nell'857 d.H.
      reference_url: https://it.wikipedia.org/wiki/Caduta_di_Costantinopoli
