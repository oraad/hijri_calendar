calendar:
  reference_label: 詳細を見る
  year_suffix: '{year} AH'
  observances:
    ramadan:
      description: ムスリムにとって断食・礼拝・内省の月であるヒジュラ暦9月目。
      reference_url: https://ja.wikipedia.org/wiki/ラマダーン
    hajj_season:
      description: ズ・ル＝ヒッジャ月の年次巡礼の季節。ハッジの儀式の日々を含む。
      reference_url: https://ja.wikipedia.org/wiki/ハッジ
    hijri_new_year:
      description: ムハッラム月1日はイスラムヒジュラ暦の年始を示す。
      reference_url: https://ja.wikipedia.org/wiki/ヒジュラ暦
    first_day_of_ramadan:
      description: 断食月が始まるラマダーンの初日。
      reference_url: https://ja.wikipedia.org/wiki/ラマダーン
    laylat_al_qadr:
      description: 運命の夜。ラマダーン27日の夜に広く記される。
      reference_url: https://ja.wikipedia.org/wiki/ライラトゥル＝カドル
    isra_and_miraj:
      description: ラジャブ27日に記される夜の旅と昇天を記念する。
      reference_url: https://ja.wikipedia.org/wiki/イスラーとミルジャー
    last_day_of_ramadan:
      description: イード・アル＝フィトル前のラマダーン最終日。
      reference_url: https://ja.wikipedia.org/wiki/ラマダーン
    eid_al_fitr_eve:
      description: ラマダーン終わりのイード・アル＝フィトル前夜。
      reference_url: https://ja.wikipedia.org/wiki/イード・アル＝フィトル
    eid_al_fitr:
      description: シャウワール1日にラマダーンの終わりを祝う祭り。
      reference_url: https://ja.wikipedia.org/wiki/イード・アル＝フィトル
    eid_al_fitr_day_2:
      description: イード・アル＝フィトル祝賀の2日目。
      reference_url: https://ja.wikipedia.org/wiki/イード・アル＝フィトル
    eid_al_fitr_day_3:
      description: イード・アル＝フィトル祝賀の3日目。
      reference_url: https://ja.wikipedia.org/wiki/イード・アル＝フィトル
    day_of_arafah:
      description: ハッジ中、ズ・ル＝ヒッジャ9日のアラファでの立ち会いの日。
      reference_url: https://ja.wikipedia.org/wiki/アラファ
    eid_al_adha:
      description: ズ・ル＝ヒッジャ10日の犠牲祭。
      reference_url: https://ja.wikipedia.org/wiki/イード・アル＝アドハー
    eid_al_adha_day_2:
      description: イード・アル＝アドハーの2日目。
      reference_url: https://ja.wikipedia.org/wiki/イード・アル＝アドハー
    eid_al_adha_day_3:
      description: イード・アル＝アドハーの3日目。
      reference_url: https://ja.wikipedia.org/wiki/イード・アル＝アドハー
    eid_al_adha_day_4:
      description: イード・アル＝アドハーの4日目。ハッジ季節の儀式の終わり。
      reference_url: https://ja.wikipedia.org/wiki/イード・アル＝アドハー
    ashura:
      description: ムハッラム10日に記される。断食と追悼に特に重要。
      reference_url: https://ja.wikipedia.org/wiki/アーシューラー
  history:
    battle_of_badr:
      name: バドル戦闘
      description: ヒジュラ暦2年、ムスリムとクライシュ族の最初の大規模な戦い。
      reference_url: https://ja.wikipedia.org/wiki/バドル戦闘
    battle_of_uhud:
      name: ウフドの戦い
      description: ヒジュラ暦3年、ウフド山付近で行われた戦い。
      reference_url: https://ja.wikipedia.org/wiki/ウフドの戦い
    battle_of_khandaq:
      name: 塹壕の戦い
      description: ヒジュラ暦5年、連合軍によるメディナ包囲。
      reference_url: https://ja.wikipedia.org/wiki/塹壕の戦い
    treaty_of_hudaybiyyah:
      name: フダイビーヤ条約
      description: ヒジュラ暦6年、ムスリムとクライシュ族の和平協定。
      reference_url: https://ja.wikipedia.org/wiki/フダイビーヤ条約
    conquest_of_khaybar:
      name: ハイバル征服
      description: ヒジュラ暦7年、ハイバル要塞に対するムスリムの遠征。
      reference_url: https://ja.wikipedia.org/wiki/ハイバル
    conquest_of_mecca:
      name: メッカ征服
      description: ヒジュラ暦8年、メッカの平和的開城。
      reference_url: https://ja.wikipedia.org/wiki/メッカ征服
    battle_of_hunayn:
      name: フナインの戦い
      description: メッカ征服後、ヒジュラ暦8年に行われた戦い。
      reference_url: https://ja.wikipedia.org/wiki/フナインの戦い
    expedition_to_tabuk:
      name: タブーク遠征
      description: ヒジュラ暦9年のタブーク遠征。
      reference_url: https://ja.wikipedia.org/wiki/タブーク遠征
    battle_of_yarmouk:
      name: ヤルムークの戦い
      description: ヒジュラ暦15年、ビザンツ軍との決定的な戦い。
      reference_url: https://ja.wikipedia.org/wiki/ヤルムークの戦い
    battle_of_qadisiyyah:
      name: カーディーシーヤの戦い
      description: ヒジュラ暦15年、イラクをムスリム軍に開いた大規模な戦い。
      reference_url: https://ja.wikipedia.org/wiki/カーディーシーヤの戦い
    conquest_of_jerusalem:
      name: エルサレム征服
      description: ヒジュラ暦17年、ムスリムによるエルサレム入城。
      reference_url: https://ja.wikipedia.org/wiki/エルサレム
    conquest_of_egypt:
      name: エジプト征服
      description: ヒジュラ暦21年、ムスリムのエジプトへの拡大。
      reference_url: https://ja.wikipedia.org/wiki/エジプト
    fall_of_constantinople:
      name: コンスタンティノープル陥落
      description: ヒジュラ暦857年、オスマン帝国によるコンスタンティノープル征服。
      reference_url: https://ja.wikipedia.org/wiki/コンスタンティノープルの陥落
