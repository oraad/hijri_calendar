calendar:
  reference_label: Meer informatie
  year_suffix: '{year} AH'
  observances:
    ramadan:
      description: De negende Hijri-maand van vasten, gebed en bezinning voor moslims.
      reference_url: https://nl.wikipedia.org/wiki/Ramadan
    hajj_season:
      description: Het jaarlijkse pelgrimseizoen in Dhu al-Hijjah, inclusief de dagen van de Hadj-riten.
      reference_url: https://nl.wikipedia.org/wiki/Hadj
    hijri_new_year:
      description: De eerste dag van Muharram markeert het begin van het islamitische Hijri-jaar.
      reference_url: https://nl.wikipedia.org/wiki/Islamitische_kalender
    first_day_of_ramadan:
      description: De eerste dag van Ramadan wanneer de vastenmaand begint.
      reference_url: https://nl.wikipedia.org/wiki/Ramadan
    laylat_al_qadr:
      description: De Nacht van het Besluit, veelal gevierd op de 27e van Ramadan.
      reference_url: https://nl.wikipedia.org/wiki/Laylat_al-Qadr
    isra_and_miraj:
      description: Herdenkt de nachtelijke reis en hemelvaart, gevierd op 27 Rajab.
      reference_url: https://nl.wikipedia.org/wiki/Isra_en_Mi%27raj
    last_day_of_ramadan:
      description: De laatste dag van Ramadan vóór Eid al-Fitr.
      reference_url: https://nl.wikipedia.org/wiki/Ramadan
    eid_al_fitr_eve:
      description: De avond vóór Eid al-Fitr aan het einde van Ramadan.
      reference_url: https://nl.wikipedia.org/wiki/Suikerfeest
    eid_al_fitr:
      description: Feest dat het einde van Ramadan markeert op 1 Shawwal.
      reference_url: https://nl.wikipedia.org/wiki/Suikerfeest
    eid_al_fitr_day_2:
      description: De tweede dag van de Eid al-Fitr-vieringen.
      reference_url: https://nl.wikipedia.org/wiki/Suikerfeest
    eid_al_fitr_day_3:
      description: De derde dag van de Eid al-Fitr-vieringen.
      reference_url: https://nl.wikipedia.org/wiki/Suikerfeest
    day_of_arafah:
      description: De dag van staan op Arafat tijdens de Hadj op 9 Dhu al-Hijjah.
      reference_url: https://nl.wikipedia.org/wiki/Ararat_(Saoedi-Arabi%C3%AB)
    eid_al_adha:
      description: Offerfeest op 10 Dhu al-Hijjah.
      reference_url: https://nl.wikipedia.org/wiki/Offerfeest
    eid_al_adha_day_2:
      description: De tweede dag van Eid al-Adha.
      reference_url: https://nl.wikipedia.org/wiki/Offerfeest
    eid_al_adha_day_3:
      description: De derde dag van Eid al-Adha.
      reference_url: https://nl.wikipedia.org/wiki/Offerfeest
    eid_al_adha_day_4:
      description: De vierde dag van Eid al-Adha en het einde van de Hadj-riten.
      reference_url: https://nl.wikipedia.org/wiki/Offerfeest
    ashura:
      description: Gevierd op 10 Muharram, vooral belangrijk voor vasten en herdenking.
      reference_url: https://nl.wikipedia.org/wiki/Ashura
  history:
    battle_of_badr:
      name: Slag bij Badr
      description: De eerste grote slag tussen moslims en Qoeraisj in 2 AH.
      reference_url: https://nl.wikipedia.org/wiki/Slag_bij_Badr
    battle_of_uhud:
      name: Slag bij Uhud
      description: Een slag nabij de berg Uhud in 3 AH.
      reference_url: https://nl.wikipedia.org/wiki/Slag_bij_Uhud
    battle_of_khandaq:
      name: Slag bij de Gracht
      description: Het beleg van Medina door de confederatie in 5 AH.
      reference_url: https://nl.wikipedia.org/wiki/Slag_bij_de_Gracht
    treaty_of_hudaybiyyah:
      name: Verdrag van Hudaybiyya
      description: Een vredesovereenkomst tussen moslims en Qoeraisj in 6 AH.
      reference_url: https://nl.wikipedia.org/wiki/Verdrag_van_Hudaybiyya
    conquest_of_khaybar:
      name: Verovering van Khaybar
      description: Moslimveldtocht tegen de forten van Khaybar in 7 AH.
      reference_url: https://nl.wikipedia.org/wiki/Khaybar
    conquest_of_mecca:
      name: Verovering van Mekka
      description: De vreedzame opening van Mekka in 8 AH.
      reference_url: https://nl.wikipedia.org/wiki/Verovering_van_Mekka
    battle_of_hunayn:
      name: Slag bij Hunayn
      description: Een slag na de verovering van Mekka in 8 AH.
      reference_url: https://nl.wikipedia.org/wiki/Slag_bij_Hunayn
    expedition_to_tabuk:
      name: Expeditie naar Tabuk
      description: De Tabuk-veldtocht in 9 AH.
      reference_url: https://nl.wikipedia.org/wiki/Expeditie_naar_Tabuk
    battle_of_yarmouk:
      name: Slag bij Yarmuk
      description: Een beslissende slag tegen Byzantijnse troepen in 15 AH.
      reference_url: https://nl.wikipedia.org/wiki/Slag_bij_Yarmuk
    battle_of_qadisiyyah:
      name: Slag bij al-Qadisiyya
      description: Een belangrijke slag die Irak opende voor moslimtroepen in 15 AH.
      reference_url: https://nl.wikipedia.org/wiki/Slag_bij_al-Qadisiyya
    conquest_of_jerusalem:
      name: Verovering van Jeruzalem
      description: De moslimintocht in Jeruzalem in 17 AH.
      reference_url: https://nl.wikipedia.org/wiki/Jeruzalem
    conquest_of_egypt:
      name: Verovering van Egypte
      description: De moslimuitbreiding naar Egypte in 21 AH.
      reference_url: https://nl.wikipedia.org/wiki/Egypte
    fall_of_constantinople:
      name: Val van Constantinopel
      description: De Ottomaanse verovering van Constantinopel in 857 AH.
      reference_url: https://nl.wikipedia.org/wiki/Val_van_Constantinopel
