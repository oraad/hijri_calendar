name: Test

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  pytest:
    name: Pytest (pinned HA)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14.2"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/
        env:
          PYTHONPATH: custom_components

  pytest-latest:
    name: Pytest (latest Home Assistant)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install test dependencies (latest HA)
        run: |
          python -m pip install --upgrade pip
          python -m pip install colorlog==6.10.1 hijridate==2.6.0
          python -m pip install pytest-homeassistant-custom-component

      - name: Log Home Assistant version
        run: python -c "import importlib.metadata as m; print('homeassistant', m.version('homeassistant'))"

      - name: Run tests
        run: python -m pytest tests/
        env:
          PYTHONPATH: custom_components
